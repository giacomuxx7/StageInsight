<!DOCTYPE html>
<html>
<head>
    <title>PCTO — Accesso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>
<style>
  :root {
    --bg:      #F5F4F1;
    --surface: #FFFFFF;
    --border:  #E4E2DC;
    --accent:  #2B5CE6;
    --accent-light: #EEF2FD;
    --text:    #1C1B18;
    --muted:   #6B6860;
    --gray:    #A8A49C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  .main-container {
    display: flex; width: 100%; max-width: 860px;
    background: var(--surface);
    border-radius: 20px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
  }
  .brand-section {
    flex: 1; background: var(--accent-light);
    padding: 3rem 2.5rem;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; border-right: 1px solid #D8E2FB; position: relative; overflow: hidden;
  }
  .brand-section::before {
    content:''; position:absolute; top:-60px; right:-60px;
    width:200px; height:200px; background:rgba(43,92,230,0.06); border-radius:50%;
  }
  .brand-section::after {
    content:''; position:absolute; bottom:-40px; left:-40px;
    width:160px; height:160px; background:rgba(43,92,230,0.04); border-radius:50%;
  }
  .brand-logo {
    display:flex; align-items:center; gap:8px; margin-bottom:1.5rem; position:relative; z-index:1;
  }
  .brand-logo-icon {
    width:36px; height:36px; background:var(--accent); border-radius:10px;
    display:flex; align-items:center; justify-content:center;
  }
  .brand-logo-icon svg { color:#fff; }
  .brand-name { font-size:18px; font-weight:600; color:var(--accent); letter-spacing:-0.01em; }
  .person-img {
    width:100%; max-width:260px; height:auto; position:relative; z-index:1; border-radius:12px;
  }
  .login-section {
    flex:1; padding:3.5rem 3rem;
    display:flex; flex-direction:column; justify-content:center;
  }
  .login-eyebrow {
    font-size:11px; font-weight:500; color:var(--accent);
    text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px;
  }
  .login-title {
    font-family:'DM Serif Display', serif; font-size:36px; font-weight:400;
    color:var(--text); line-height:1.1; margin-bottom:6px; letter-spacing:-0.01em;
  }
  .login-sub { font-size:13px; color:var(--muted); margin-bottom:28px; }
  .input-icon-wrap { position:relative; margin-bottom:12px; }
  .input-icon-wrap input {
    width:100%; padding:11px 14px 11px 42px;
    border:1px solid var(--border); border-radius:8px;
    background:var(--bg); font-size:14px; font-family:'DM Sans', sans-serif;
    outline:none; color:var(--text); transition:all 0.15s;
  }
  .input-icon-wrap input:focus {
    background:var(--surface); border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(43,92,230,0.1);
  }
  .input-icon-wrap input::placeholder { color:var(--gray); }
  .input-icon-wrap svg {
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    color:var(--gray); pointer-events:none;
  }
  .btn-login {
    width:100%; padding:12px; margin-top:8px;
    border:none; border-radius:8px; background:var(--text);
    color:white; font-weight:500; font-size:14px; font-family:'DM Sans', sans-serif;
    cursor:pointer; letter-spacing:0.01em; transition:background 0.15s;
  }
  .btn-login:hover { background:#333; }
  .error-msg {
    color:#C62828; font-size:12px; margin-top:10px; text-align:center;
    background:#FFEBEE; border:1px solid #EF9A9A; border-radius:6px; padding:8px 12px;
  }
  @media (max-width:680px) {
    .main-container { flex-direction:column; }
    .brand-section { padding:2rem; border-right:none; border-bottom:1px solid var(--border); }
    .login-section { padding:2rem 1.5rem; }
    .person-img { max-width:180px; }
  }
</style>
<body>
<div class="main-container">
  <div class="brand-section">
    <div class="brand-logo">
      <div class="brand-logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <span class="brand-name">StageInsight</span>
    </div>
    <img src="/IMMAGINE.png" alt="StageInsight" class="person-img">
  </div>
  <div class="login-section">
    <div class="login-eyebrow">Portale PCTO</div>
    <div class="login-title">Accesso</div>
    <div class="login-sub">Inserisci le tue credenziali per continuare</div>
    <form method="post">
      <div class="input-icon-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="text" name="username" placeholder="Email o username" required>
      </div>
      <div class="input-icon-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <input type="submit" value="Accedi" class="btn-login">
    </form>
    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% end %}
  </div>
</div>
</body>
</html>
