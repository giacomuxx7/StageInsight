<!DOCTYPE html>
<html>
<head>
    <title>PCTO — Accesso</title>
    <!-- viewport: FONDAMENTALE per il responsive su mobile/schermo diviso -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        font-family: sans-serif;
        /* padding laterale: evita che la box tocchi i bordi su schermi stretti */
        padding: 1rem;
    }

    .login-box {
        width: 100%;
        max-width: 360px;
        background: #fff;
        border: 0.5px solid #e0e0e0;
        border-radius: 12px;
        padding: 2rem;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 600;
      letter-spacing: -1px;
      margin-bottom: 8px;
      line-height: 1;
    }

    .login-sub {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 36px;
    }

     /* contenitore input + icona */
    .input-icon-wrap {
        position: relative;
        margin-bottom: 12px;
    }

    /* icona posizionata dentro il campo */
    .input-icon-wrap svg {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);  /* centra verticalmente */
        color: #aaa;
        pointer-events: none;         /* i click passano all'input sotto */
    }

    /* input con spazio a sinistra per l'icona */
    .input-icon-wrap input {
        width: 100%;
        padding: 9px 12px 9px 36px;   /* 36px a sinistra = spazio icona */
        border: 0.5px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
    }

    .input-icon-wrap input:focus { border-color: #888; }

    input[type="submit"] {
        width: 100%;
        padding: 9px;
        margin-top: 6px;
        border: 0.5px solid #ccc;
        border-radius: 8px;
        background: #f5f5f5;
        font-size: 14px;
        cursor: pointer;
    }

    input[type="submit"]:hover { background: #e8e8e8; }

     /* su schermi molto stretti (< 400px) riduci il padding del box */
    @media (max-width: 400px) {
        .login-box { padding: 1.25rem; }
        .login-title { font-size: 28px; }
    }
</style>
<body>

<div class="login-box">
        <div class="login-title">ACCESSO</div>
        <div class="login-sub">Inserisci le tue credenziali</div>

        <form method="post">
            <div class="input-icon-wrap">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-icon-wrap">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <input type="submit" value="Accedi">
        </form>

        {% if error %}
            <p style="color:red; font-size:13px; margin-top:10px;">{{ error }}</p>
        {% end %}
    </div>
</body>
</html>
