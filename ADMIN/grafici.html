<!DOCTYPE html>
<html lang="it">
<head>
    <title>Grafici</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body { font-family: sans-serif; background: #f9f9f9; }

      /* ── HEADER ── */
      .admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        padding: 1.25rem 1rem;
        background: #fff;
        border-bottom: 0.5px solid #e0e0e0;
      }
      .admin-title { font-size: 24px; font-weight: 600; margin: 0; }
      .nav-btns { display: flex; gap: 8px; flex-wrap: wrap; }
      .nav-btn {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 13px; font-weight: 500; text-decoration: none;
        padding: 7px 14px; border-radius: 8px; border: 0.5px solid #ccc;
        color: #1a1a1a; background: #fff; cursor: pointer;
        font-family: sans-serif; white-space: nowrap;
      }
      .nav-btn:hover { background: #f5f5f5; }
      .nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
      .logout-btn {
        font-size: 13px; background: none; border: 0.5px solid #ccc;
        color: #888; padding: 5px 12px; border-radius: 8px;
        cursor: pointer; font-family: sans-serif;
      }
      .logout-btn:hover { background: #f5f5f5; color: #1a1a1a; }

      /* ── CORPO ── */
      .page-body { padding: 1.25rem 1rem; }

      /* griglia 2 colonne, su mobile 1 colonna */
      .charts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 700px) {
        .charts-grid { grid-template-columns: 1fr; }
      }

      /* riquadro singolo grafico */
      .chart-card {
        background: #fff;
        border: 0.5px solid #e0e0e0;
        border-radius: 12px;
        overflow: hidden;
      }

      /* intestazione con titolo */
      .chart-card-header {
        padding: 14px 18px 12px;
        border-bottom: 0.5px solid #e0e0e0;
      }

      .chart-card-header h3 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        color: #1a1a1a;
      }

      /* area del grafico: altezza fissa necessaria per Chart.js */
      .chart-card-body {
        padding: 16px 18px;
        position: relative;
        height: 280px;
        display: flex;
        justify-content: center;
      }
    </style>
</head>
<body>

<div class="admin-header">
  <div>
    <h1 class="admin-title">Benvenuto, {{ user }} </h1>
  </div>

  <div class="nav-btns">
    <a class="nav-btn" href="/enti">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Enti
    </a>
    <a class="nav-btn" href="/grafici">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Grafici
    </a>
    <a class="nav-btn" href="/questionari">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Questionari
    </a>
    <form action="/login" method="get" style="margin:0;">
      <button type="submit" class="logout-btn">Esci</button>
    </form>
  </div>
</div>

<div class="page-body">
  <div class="charts-grid">

    <div class="chart-card">
      <div class="chart-card-header">
        <h3>Distribuzione Scala</h3>
      </div>
      <div class="chart-card-body">
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <h3>Punteggi Competenze</h3>
      </div>
      <div class="chart-card-body">
        <canvas id="barCompetenze"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <h3>Punteggi Contesti</h3>
      </div>
      <div class="chart-card-body">
        <canvas id="barContesti"></canvas>
      </div>
    </div>

    <div>
    <form action="/grafici" method="get">
      <div class="card">
        <div class="card-body">
          <div class="pref-row">
            <span class="pref-label">Filtro enti</span>
              <select name="id_filtro" onchange="this.form.submit()">
              <option value="">— Tutti gli enti —</option>
              {% for ente in enti %}
                <option value="{{ ente['name'] }}" {% if ente['name'] == id_filtro %}selected{% end %}>
                  {{ ente['name'] }}
                </option>
              {% end %}
            </select>
          </div>
        </div>
      </div>
    </form>
    </div>
  </div>
</div>

<script>
    const scala = {% raw scala %};
    const competenze = {% raw competenze %};
    const contesti = {% raw contesti %};

    // Funzione per pulire undefined dalle labels
    function cleanLabelsAndData(obj) {
        const cleanedLabels = [];
        const cleanedData = [];

        for (const [key, value] of Object.entries(obj)) {
            // Salta chiavi undefined, null, vuote o che sono "undefined" come stringa
            if (key && key !== 'undefined' && key !== 'null' && key !== '') {
                cleanedLabels.push(key);
                cleanedData.push(value || 0);
            }
        }

        // Se dopo la pulizia non ci sono dati, aggiungi un placeholder
        if (cleanedLabels.length === 0) {
            cleanedLabels.push('Nessun dato');
            cleanedData.push(0);
        }

        return { labels: cleanedLabels, data: cleanedData };
    }

    // Opzioni comuni per rendere i grafici responsivi
    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                position: 'top',
            },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        let label = context.label || '';
                        let value = context.raw || 0;
                        return `${label}: ${value}`;
                    }
                }
            }
        }
    };

    // PULIZIA DATI PER LA TORTA
    const pieClean = cleanLabelsAndData(scala);

    // TORTA
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: pieClean.labels,
            datasets: [{
                data: pieClean.data,
                backgroundColor: [
                    '#4caf50', '#2196f3', '#ff9800', '#f44336', '#9c27b0',
                    '#00bcd4', '#ffeb3b', '#795548', '#607d8b', '#e91e63'
                ]
            }]
        },
        options: commonOptions
    });

    // PULIZIA DATI PER LE BARRE
    const competenzeClean = cleanLabelsAndData(competenze);
    const contestiClean = cleanLabelsAndData(contesti);

    // ISTOGRAMMA COMPETENZE
    new Chart(document.getElementById('barCompetenze'), {
        type: 'bar',
        data: {
            labels: competenzeClean.labels,
            datasets: [{
                label: 'Punteggio',
                data: competenzeClean.data,
                backgroundColor: '#42a5f5',
                borderRadius: 4
            }]
        },
        options: {
            ...commonOptions,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true
                    }
                },
                x: {
                    title: {
                        display: true
                    }
                }
            }
        }
    });

    // ISTOGRAMMA CONTESTI
    new Chart(document.getElementById('barContesti'), {
        type: 'bar',
        data: {
            labels: contestiClean.labels,
            datasets: [{
                label: 'Punteggio',
                data: contestiClean.data,
                backgroundColor: '#66bb6a',
                borderRadius: 4
            }]
        },
        options: {
            ...commonOptions,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true
                    }
                },
                x: {
                    title: {
                        display: true
                    }
                }
            }
        }
    });
</script>

</body>
</html>
