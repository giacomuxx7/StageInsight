<!DOCTYPE html>

<style>
    /* ── HEADER ── */
  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 1.25rem 1rem;

  .admin-title { font-size: 24px; font-weight: 600; margin: 0; }

    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    border: 0.5px solid #ccc;
    color: #1a1a1a;

    cursor: pointer;
    font-family: sans-serif;
    white-space: nowrap;
  }
  .nav-btn:hover { background: #f5f5f5; }
  .nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    border: 0.5px solid #ccc;
    color: #888;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: sans-serif;
  }
  .logout-btn:hover { background: #f5f5f5; color: #1a1a1a; }
  .chart-wrap { position:relative; height:240px; }
</style>
