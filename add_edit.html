<!DOCTYPE html>
<html>
<head>
    <title>Catalogo Prodotti</title>
</head>
<body>
    {% if name %}
    <form method="post" action="/enti/edit/{{id}}">
        <input type="text" name="name" value="{{name}}" placeholder="text" required>name
        <br>
        <input type="text" name="contact" value="{{contact}}" placeholder="text" required>contact
        <br>
        <input type="text" name="phone" value="{{phone}}" placeholder="text" required>phone
        <br>
        <input type="text" name="address" value="{{address}}" placeholder="text" required>address
        <br>
        <input type="text" name="sector" value="{{sector}}" placeholder="text" required>sector
        <br>
        <input type="text" name="site" value="{{site}}" placeholder="text" required>site
        <br>
        <input type="text" name="capacity" value="{{capacity}}" placeholder="text" required>capacity
        <br>
        <input type="text" name="tutor" value="{{tutor}}" placeholder="text" required>tutor
        <br>
        <input type="text" name="tutor_phone" value="{{tutor_phone}}" placeholder="text" required>tutor_phone
        <br>
        <input type="text" name="schedule" value="{{schedule}}" placeholder="text" required>schedule
        <br>
        <input type="submit" value="Modifica">
    </form>
    {% else %}
    <form method="post" action="/enti/add">
        <input type="text" name="name" placeholder="Nome" required>
        <input type="text" name="contact" placeholder="Contact" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="text" name="address" placeholder="Address" required>
        <input type="text" name="sector" placeholder="Sector" required>
        <input type="text" name="site" placeholder="Site" required>
        <input type="text" name="capacity" placeholder="Capacity" required>
        <input type="text" name="tutor" placeholder="Tutor" required>
        <input type="text" name="tutor_phone" placeholder="Tutor phone" required>
        <input type="text" name="schedule" placeholder="Schedule" required>
        <input type="submit" value="Aggiungi">
    </form>
    {% end %}

<br>
    <nax>
        <a href="/enti">Torna alla lista</a>
    </nax>
</body>
</html>
